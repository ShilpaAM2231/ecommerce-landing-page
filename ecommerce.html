<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background-color:#f9f9f9;
            margin: 0;
            
        }
        .Top{ 
            margin-left: 250px;
            background-color: white;
              padding: 1rem 2rem;
           display: flex;
            justify-content:center;
            align-items: center;
      border-bottom: 1px solid #ddd;
       max-width: 1000px;
             
        }
        .Filter{
             margin-left: 250px;
            display: flex;
            justify-content:center;
            gap: 2rem;
            padding:1.5rem;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            max-width: 1000px;
            
        }
        span{
            margin-right: 500px;
            font-size: 2rem;
           font-weight:bold;
          
         
        }
        div.Top a {
           font-size: 1rem;
            text-decoration: none;
            margin-left: 1.5rem;
            color: #333;
          
        }
        .Top a:hover {
            color: #007bff;
        }
        
        
        select{
           border:1px solid #ccc;
            padding: 0.5rem;
            border-radius: 5px;
            cursor: pointer;
          

        }
        .Filter label{
          
       
        font-weight: bold;

        }
        .Things{
            margin: auto;
            display: grid;
          grid-template:repeat(2,1fr)/ repeat(2,1fr);
            gap: 2rem;
            padding: 2rem;
            max-width: 1000px;
        }
       
        .box{
           
            background-color: white;
            padding:1.5rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            
        }
        .box img{
            width: 100%;
            height: 200px;
            object-fit: contain;
        }
        .box h3{
            font-size: 1.2rem;
            margin: 0.5rem 0.5rem;
        }
        .box button{
            color: #fff;
            padding: 0.5rem;
            background-color:darkblue;
            border: none;
            border-radius: 2px;
            font-weight: bold;
            cursor: pointer;
        }
        .box button:hover {
      background-color: #1d4ed8;
    }
    .Filter div{
        width: 400px;
    }
    </style>


</head>
<body>
    <div class="Top">
        <span>ShopEase UI</span>
   
       <a href="#home">Home</a>
        <a href="#products">Products</a>
        <a href="#cart">Cart</a>
   
       
    </div>


   <div class="Filter">
        <div>
           <label for="Filterby">Filter by</label> 
            <select name="Filterby" id="Filterby">
                 <option value="defaukt optn">All Categories</option>
                <option value="optn1">Dresses</option>
                <option value="optn2">Headphones</option>
                <option value="optn3">Smartwatch</option>
                 <option value="optn4">Sneakers</option>
            </select>
        </div>

        <div>
           <label for="Sortby">Sort by</label>
            <select name="Sortby" id="Sortby">
               <option value="default">default</option>
               <option value="option1">price</option>
               <option value="option2">color</option>
               <option value="option3">size</option>
            </select>
        </div>  

    </div>

    <div class="Things">
        
        <div class="box">
           <img src="/images/t shirt.jpeg" alt="">
           <h3>Product1</h3>
           <h4>500 $</h4>
           <button>Add to cart</button>
       
        </div>
   
     
        <div class="box">
   
           <img src="/images/headphone.jpg" alt="">
           <h3>Product2</h3>
           <h4>1500 $</h4>
         <button>Add to cart</button>
        
        </div> 
       
   
  

        <div class="box">
            <img src="/images/smartwatches.webp" alt="">
            <h3>Product3</h3>
            <h4>2500 $</h4>
            <button>Add to cart</button>
        </div>
        
   
  
        <div class="box">
            <img src="/images/sneakers.jpg" alt="">
            <h3>Product4</h3>
            <h4>400 $</h4>
            <button>Add to cart</button>
        </div>
       
    </div>
  
  
   
    </body>
</html>
