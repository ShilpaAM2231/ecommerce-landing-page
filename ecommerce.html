<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase UI</title>

<style>

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
color:#333;
background-color:#f9f9f9;
margin:0;
}

/* HEADER */

.Top{
background:white;
padding:1rem 2rem;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
max-width:1000px;
margin:auto;
}

.logo{
font-size:2rem;
font-weight:bold;
}

.Top a{
font-size:1rem;
text-decoration:none;
margin-left:1.5rem;
color:#333;
}

.Top a:hover{
color:#007bff;
}


/* FILTER SECTION */

.Filter{
display:flex;
justify-content:space-between;
gap:2rem;
padding:1.5rem;
background-color:#fff;
border-bottom:1px solid #ddd;
max-width:1000px;
margin:auto;
}

.Filter label{
font-weight:bold;
margin-right:10px;
}

select{
border:1px solid #ccc;
padding:0.5rem;
border-radius:5px;
cursor:pointer;
}


/* PRODUCT GRID */

.Things{
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:2rem;
padding:2rem;
max-width:1000px;
}


/* PRODUCT CARD */

.box{
background-color:white;
padding:1.5rem;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.05);
transition:transform 0.2s ease, box-shadow 0.2s ease;
}

.box:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.box img{
width:100%;
height:200px;
object-fit:contain;
}

.box h3{
font-size:1.2rem;
margin:0.5rem 0.5rem;
}

.box button{
background-color:#2563eb;
color:white;
padding:0.6rem 1rem;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.box button:hover{
background-color:#1d4ed8;
}

</style>
</head>

<body>


<!-- HEADER -->

<div class="Top">

<div class="logo">ShopEase UI</div>

<div>
<a href="#home">Home</a>
<a href="#products">Products</a>
<a href="#cart">Cart</a>
</div>

</div>


<!-- FILTER -->

<div class="Filter">

<div>
<label for="Filterby">Filter by</label>

<select name="Filterby" id="Filterby">
<option>All Categories</option>
<option>Dresses</option>
<option>Headphones</option>
<option>Smartwatch</option>
<option>Sneakers</option>
</select>

</div>


<div>

<label for="Sortby">Sort by</label>

<select name="Sortby" id="Sortby">
<option>Default</option>
<option>Price</option>
<option>Color</option>
<option>Size</option>
</select>

</div>

</div>


<!-- PRODUCTS -->

<div class="Things">

<div class="box">
<img src="images/t shirt.jpeg">
<h3>Product1</h3>
<h4>500 $</h4>
<button>Add to cart</button>
</div>


<div class="box">
<img src="images/headphone.jpg">
<h3>Product2</h3>
<h4>1500 $</h4>
<button>Add to cart</button>
</div>


<div class="box">
<img src="images/smartwatches.webp">
<h3>Product3</h3>
<h4>2500 $</h4>
<button>Add to cart</button>
</div>


<div class="box">
<img src="images/sneakers.jpg">
<h3>Product4</h3>
<h4>400 $</h4>
<button>Add to cart</button>
</div>

</div>

</body>
</html>
